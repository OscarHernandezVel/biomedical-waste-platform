spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.application.name=biomedical-waste-platform
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:residuos_biomedicos}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.jackson.serialization.write-dates-as-timestamps=false

openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-3.5-turbo}
openai.max-tokens=${OPENAI_MAX_TOKENS:1000}
openai.temperature=${OPENAI_TEMPERATURE:0.7}

admin.api.key=${ADMIN_API_KEY:}
